<!-- Botón menú hamburguesa -->
<div class="lg:hidden">
  <button
    (click)="toggleMenu()"
    type="button"
    class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200"
    [attr.aria-expanded]="isMenuOpen">
    <span class="sr-only">{{ isMenuOpen ? 'Cerrar menú' : 'Abrir menú' }}</span>
    <svg [ngClass]="{'hidden': isMenuOpen, 'block': !isMenuOpen}" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
    </svg>
    <svg [ngClass]="{'hidden': !isMenuOpen, 'block': isMenuOpen}" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
    </svg>
  </button>
</div>

<!-- Menú móvil -->
<div
  *ngIf="isMenuOpen"
  class="lg:hidden absolute top-full left-0 right-0 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 shadow-lg">
  <div class="px-4 py-4 space-y-1">

    <!-- Búsqueda móvil -->
    <div class="mb-4">
      <app-navbar-search
        [placeholder]="searchPlaceholder"
        [containerClass]="''"
        [inputClass]="'w-full rounded-lg'"
        [showSearchButton]="false"
        (search)="onSearch($event)">
      </app-navbar-search>
    </div>

    <!-- Enlaces antes del mega menú -->
    <a
      *ngFor="let item of menuItemsBefore"
      [routerLink]="item.link"
      [href]="item.isExternal ? item.link : null"
      (click)="closeMenu()"
      class="block px-3 py-2 text-base font-medium text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200">
      {{ item.label }}
    </a>

    <!-- DESCUBRIR - Versión móvil -->
    <div *ngIf="showMegaMenu" class="space-y-2">
      <button
        (click)="toggleMobileDropdown()"
        class="flex items-center justify-between w-full px-3 py-2 text-base font-medium text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200">
        {{ megaMenuTitle }}
        <svg [ngClass]="{'rotate-180': isMobileDropdownOpen}" class="w-4 h-4 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>

      <!-- Submenú móvil -->
      <div *ngIf="isMobileDropdownOpen" class="ml-4 space-y-1">
        <a
          *ngFor="let category of categories; trackBy: trackByCategory"
          [routerLink]="category.link"
          (click)="closeMenu()"
          class="block px-3 py-2 text-sm text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200">
          {{ category.name }}
        </a>
      </div>
    </div>

    <!-- Enlaces después del mega menú -->
    <a
      *ngFor="let item of menuItemsAfter"
      [routerLink]="item.link"
      [href]="item.isExternal ? item.link : null"
      (click)="closeMenu()"
      class="block px-3 py-2 text-base font-medium text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200">
      {{ item.label }}
    </a>

    <!-- Acciones móviles -->
    <div class="pt-4 mt-4 border-t border-gray-200 dark:border-gray-600 flex items-center justify-between">
      <button
        (click)="onThemeToggle()"
        class="flex items-center px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-lg transition-colors duration-200">
        <svg *ngIf="isDarkMode" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.071-7.071l-1.414 1.414M6.343 17.657l-1.414 1.414M17.657 17.657l1.414 1.414M6.343 6.343L4.929 4.929M12 6a6 6 0 100 12 6 6 0 000-12z"></path>
        </svg>
        <svg *ngIf="!isDarkMode" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 1021 12.79z"></path>
        </svg>
        {{ isDarkMode ? 'Modo claro' : 'Modo oscuro' }}
      </button>

      <div class="flex items-center space-x-2">
        <button
          (click)="onUserClick()"
          class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200"
          aria-label="Perfil de usuario">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
        </button>
        <button
          (click)="onCartClick()"
          class="relative p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200"
          aria-label="Carrito de compras">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4m-.4-2L4 3H2m5 10v6a1 1 0 001 1h10a1 1 0 001-1v-6"></path>
          </svg>
          <span
            *ngIf="cartItemsCount > 0"
            class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-4 w-4 flex items-center justify-center font-medium">
            {{ cartItemsCount > 99 ? '99+' : cartItemsCount }}
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
