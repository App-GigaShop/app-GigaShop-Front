<!-- src/app/shared/components/nav/navbar-search/navbar-search.component.html -->
<div class="relative w-full" [ngClass]="containerClass">
  <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
    <svg class="h-4 w-4 text-gray-400"
         fill="none"
         stroke="currentColor"
         viewBox="0 0 24 24"
         aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
    </svg>
  </div>

  <input
    type="text"
    [(ngModel)]="searchQuery"
    (keyup.enter)="performSearch()"
    (focus)="onFocus()"
    (blur)="onBlur()"
    [placeholder]="placeholder"
    [ngClass]="inputClass"
    class="block w-full pl-10 pr-10 py-2 sm:py-2.5 border border-gray-300 dark:border-gray-600 text-sm placeholder-gray-500 dark:placeholder-gray-400 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
    [class.ring-2]="isFocused"
    [class.ring-blue-500]="isFocused"
    autocomplete="off"
    spellcheck="false"
    [attr.aria-label]="placeholder">

  <!-- Botones de acción -->
  <div class="absolute inset-y-0 right-0 flex items-center pr-2">
    <!-- Botón de limpiar -->
    <button
      *ngIf="searchQuery"
      (click)="clearSearch()"
      class="p-1 hover:text-red-500 transition-colors duration-200 rounded"
      aria-label="Limpiar búsqueda"
      type="button">
      <svg class="w-4 h-4 text-gray-400"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24"
           aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

    <!-- Botón de búsqueda - Corregida la advertencia -->
    <button
      *ngIf="showSearchButton"
      (click)="performSearch()"
      [disabled]="!searchQuery || !searchQuery.trim()"
      class="ml-1 p-1 hover:text-blue-600 transition-colors duration-200 rounded disabled:opacity-50 disabled:cursor-not-allowed"
      aria-label="Buscar"
      type="button">
      <svg class="w-4 h-4 text-gray-500 dark:text-gray-400"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24"
           aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
    </button>
  </div>
</div>
