<nav class="bg-white dark:bg-gray-900 fixed w-full z-50 top-0 shadow-sm border-b border-gray-200 dark:border-gray-700">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <app-navbar-logo></app-navbar-logo>

      <!-- Menú principal - Desktop -->
      <app-navbar-menu
        [menuItemsBefore]="menuItemsBefore"
        [menuItemsAfter]="menuItemsAfter"
        [showMegaMenu]="true"
        [megaMenuTitle]="'DESCUBRIR'"
        [categories]="categories"
        [viewAllText]="'Ver todos los productos'"
        (categoryClick)="onCategoryClick($event)"
        (viewAllClick)="onViewAllClick()">
      </app-navbar-menu>

      <!-- Barra de búsqueda y acciones - Desktop -->
      <div class="hidden lg:flex items-center space-x-4">
        <app-navbar-search
          [placeholder]="'Buscar.....'"
          [containerClass]="''"
          [inputClass]="'w-80 rounded-full'"
          (search)="onSearch($event)">
        </app-navbar-search>

        <app-navbar-actions
          [isDarkMode]="isDarkMode"
          [cartItemsCount]="cartItemsCount"
          (themeToggle)="toggleTheme()"
          (userClick)="onUserClick()"
          (cartClick)="onCartClick()">
        </app-navbar-actions>
      </div>

      <!-- Botón menú móvil -->
      <app-navbar-mobile
        [isMenuOpen]="isMenuOpen"
        [isMobileDropdownOpen]="isMobileDropdownOpen"
        [isDarkMode]="isDarkMode"
        [cartItemsCount]="cartItemsCount"
        [searchPlaceholder]="'Buscar.....'"
        [menuItemsBefore]="menuItemsBefore"
        [menuItemsAfter]="menuItemsAfter"
        [showMegaMenu]="true"
        [megaMenuTitle]="'DESCUBRIR'"
        [categories]="categories"
        (menuToggle)="toggleMenu()"
        (mobileDropdownToggle)="toggleMobileDropdown()"
        (themeToggle)="toggleTheme()"
        (userClick)="onUserClick()"
        (cartClick)="onCartClick()"
        (search)="onSearch($event)">
      </app-navbar-mobile>
    </div>
  </div>
</nav>
