<!-- src/app/shared/components/nav/navbar-actions/navbar-actions.component.html -->
<div class="flex items-center space-x-2 xl:space-x-4">
  <!-- Botón de tema con mejor accesibilidad -->
  <button
    (click)="themeToggle.emit()"
    class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors duration-200"
    [attr.aria-label]="isDarkMode ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
    [attr.aria-pressed]="isDarkMode"
    type="button">

    <svg *ngIf="isDarkMode"
         class="w-5 h-5"
         fill="none"
         stroke="currentColor"
         viewBox="0 0 24 24"
         aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.071-7.071l-1.414 1.414M6.343 17.657l-1.414 1.414M17.657 17.657l1.414 1.414M6.343 6.343L4.929 4.929M12 6a6 6 0 100 12 6 6 0 000-12z"></path>
    </svg>

    <svg *ngIf="!isDarkMode"
         class="w-5 h-5"
         fill="none"
         stroke="currentColor"
         viewBox="0 0 24 24"
         aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 1021 12.79z"></path>
    </svg>
  </button>

  <!-- Usuario con tooltip -->
  <div class="relative group">
    <button
      (click)="userClick.emit()"
      class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors duration-200"
      aria-label="Acceder al perfil de usuario"
      type="button">

      <svg class="w-5 h-5"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24"
           aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
      </svg>
    </button>

    <!-- Tooltip -->
    <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 px-2 py-1 text-xs text-white bg-gray-900 dark:bg-gray-700 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none whitespace-nowrap">
      Mi perfil
    </div>
  </div>

  <!-- Carrito con mejor indicador -->
  <div class="relative group">
    <button
      (click)="cartClick.emit()"
      class="relative p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors duration-200"
      [attr.aria-label]="'Carrito de compras' + (cartItemsCount > 0 ? ', ' + cartItemsCount + ' artículos' : ', vacío')"
      type="button">

      <svg class="w-5 h-5"
           fill="none"
           stroke="currentColor"
           viewBox="0 0 24 24"
           aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4m-.4-2L4 3H2m5 10v6a1 1 0 001 1h10a1 1 0 001-1v-6"></path>
      </svg>

      <!-- Contador mejorado -->
      <span
        *ngIf="cartItemsCount > 0"
        class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-medium animate-pulse"
        [attr.aria-label]="cartItemsCount + ' artículos en el carrito'">
        {{ cartItemsCount > 99 ? '99+' : cartItemsCount }}
      </span>
    </button>

    <!-- Tooltip con información del carrito -->
    <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 px-2 py-1 text-xs text-white bg-gray-900 dark:bg-gray-700 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none whitespace-nowrap">
      {{ cartItemsCount === 0 ? 'Carrito vacío' : cartItemsCount + ' artículo' + (cartItemsCount === 1 ? '' : 's') }}
    </div>
  </div>
</div>
